<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SHAOL Sphere</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/login.css">
</head>
<body>
    <main id="landing-page">
        <header id="header">
            <div>
                <a href="index.html"><img id="header-logo" src="assets/Logo.jpg"></a>
            </div>
            <div>
                <button id="skip-button">SKIP</button>
            </div>
        </header>
        <div id="login-section">
            <div id="login-box">
                <div>
                    <h1>Login</h1>
                    <hr>
                </div>
                <form action="">
                    <div id="login-form">
                        <div class="input-field">
                            <label for="login-email">Email: </label>
                            <input type="email" name="login-email" id="login-email" placeholder="Enter your email">
                        </div>
                        <div class="input-field">
                            <label for="login-password">Password: </label>
                            <input type="password" name="login-password" id="login-password" placeholder="Enter your password">
                        </div>
                        <div class="input-field" >
                            <button id="login-btn">
                                <a href="#" >Login</a>
                            </button>
                        </div>
                        <div id="bottom-section">
                            <p>New Here? <a href="register.html">Join Us Now</a></p>
                            <p><a href="#">Forgot Password</a></p>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
