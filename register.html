<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SHAOL Sphere</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/log-reg-style.css">
    <script src="js/reg.js"></script>

</head>

<body>
    <main id="register-page">
        <header id="header">
            <div>
                <a href="index.html"><img id="header-logo" src="assets/Logo.jpg"></a>
            </div>
            <div>
                <a class="button" id="skip-button">SKIP</a>
            </div>
        </header>
        <div id="register-section">
            <div id="register-box">
                <div>
                    <h1>Register</h1>
                    <hr>
                </div>
                <form action="">
                    <div id="register-form">
                        <div class="input-field">
                            <label for="register-username">Username:</label>
                            <input type="text" name="register-username" id="register-username"
                                placeholder="Enter your username">
                        </div>
                        <div class="input-field">
                            <label for="register-name">Full Name:</label>
                            <input type="text" name="register-name" id="register-name"
                                placeholder="Enter your full name">
                        </div>
                        <div class="input-field">
                            <div id="dob-container">
                                <label for="day">Date of birth</label>
                                <div id="dob-fields">
                                    <select id="day" name="day">
                                        <option value="">Day</option>
                                    </select>

                                    <select id="month" name="month">
                                        <option value="">Month</option>
                                        <option value="1">Jan</option>
                                        <option value="2">Feb</option>
                                        <option value="3">Mar</option>
                                        <option value="4">Apr</option>
                                        <option value="5">May</option>
                                        <option value="6">Jun</option>
                                        <option value="7">Jul</option>
                                        <option value="8">Aug</option>
                                        <option value="9">Sep</option>
                                        <option value="10">Oct</option>
                                        <option value="11">Nov</option>
                                        <option value="12">Dec</option>
                                    </select>

                                    <select id="year" name="year">
                                        <option value="">Year</option>
                                    </select>
                                </div>
                            </div>

                        </div>
                        <div class="input-field">
                            <label for="register-gender">Gender:</label>
                            <div id="gender-selection">
                                <label class="gender" id="male">
                                    <input type="radio" name="register-gender" id="register-gender-male" value="male">
                                    Male
                                </label>
                                <label class="gender" id="female">
                                    <input type="radio" name="register-gender" id="register-gender-female"
                                        value="female">
                                    Female
                                </label>
                            </div>
                        </div>
                        <div class="input-field">
                            <label for="register-email">Email:</label>
                            <input type="email" name="register-email" id="register-email"
                                placeholder="Enter your email">
                        </div>
                        <div class="input-field">
                            <label for="register-password">Password: </label>
                            <input type="password" name="register-password" id="register-password"
                                placeholder="Enter your password">
                        </div>
                        <div class="input-field">
                            <button type="submit" class="button" id="register-btn">Register</button>
                        </div>
                        <div id="bottom-section">
                            <p>Already Joined? <a href="login.html">Login Here</a></p>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>

</html>
